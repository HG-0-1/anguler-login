<!DOCTYPE html>
<html ng-app="loginApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AngularJS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body ng-controller="LoginController">
    <div class="login-container">
        <div class="login-box">
            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- Login Form -->
            <form name="loginForm" class="login-form" ng-submit="login()">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        ng-model="credentials.username"
                        placeholder="Enter your username"
                        class="form-control"
                        required>
                    <span class="error-message" ng-show="loginForm.username.$error.required && loginForm.username.$touched">
                        <i class="fas fa-exclamation-circle"></i> Username is required
                    </span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-key"></i> Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        ng-model="credentials.password"
                        placeholder="Enter your password"
                        class="form-control"
                        required>
                    <span class="error-message" ng-show="loginForm.password.$error.required && loginForm.password.$touched">
                        <i class="fas fa-exclamation-circle"></i> Password is required
                    </span>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="rememberMe" 
                        ng-model="rememberMe">
                    <label for="rememberMe">
                        <i class="fas fa-check"></i> Remember me for 30 days
                    </label>
                </div>

                <!-- Login Button -->
                <button 
                    type="submit" 
                    class="btn btn-primary btn-block"
                    ng-disabled="loginForm.$invalid">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Error Message -->
            <div class="error-alert" ng-show="loginError">
                <i class="fas fa-times-circle"></i>
                <p>{{ loginError }}</p>
            </div>

            <!-- Footer Links -->
            <div class="login-footer">
                <a href="#" class="link"><i class="fas fa-question-circle"></i> Forgot Password?</a>
                <span class="separator">•</span>
                <a href="#" class="link"><i class="fas fa-user-plus"></i> Sign Up</a>
            </div>
        </div>
    </div>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
