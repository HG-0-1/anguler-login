<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Optimiza</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1" aria-hidden="true"></div>
    <div class="bg-shape shape-2" aria-hidden="true"></div>

    <main class="login-card">
      <p class="card-tag">Secure Portal</p>
      <img src="optimiza.png" alt="Optimiza logo" class="brand-logo" />
      <p class="subtitle">Sign in to continue to your workspace</p>

      <form>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" />

        <div class="form-row">
          <label class="remember-me">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Log In</button>
      </form>

      <p class="footer-text">
        New here?
        <a href="#">Create account</a>
      </p>
    </main>
  </body>
</html>
