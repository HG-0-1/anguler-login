<div>
    <form ng-submit="login()">
        <h2>your name</h2>
        <input type="text" ng-model="user.username" placeholder="enter your name">

        <h2>password</h2>
        <input type="password" ng-model="user.password" placeholder="enter your password">

        <button type="submit">enter</button>
    </form>
    <p class="error">{{error}}</p>
</div>
