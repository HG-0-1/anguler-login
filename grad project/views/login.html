<div class="login-container" ng-controller="LoginController">
    <div class="login-box">
        <h1>🔐 Login</h1>
        <p>Welcome back! Please login to your account</p>
        
        <!-- Error Message -->
        <div ng-if="errorMessage" class="error-message">
            <span ng-bind="errorMessage"></span>
        </div>

        <!-- Login Form -->
        <form ng-submit="login()" class="login-form">
            <div class="form-group">
                <label for="username">👤 Username</label>
                <input 
                    type="text" 
                    id="username" 
                    ng-model="credentials.username" 
                    placeholder="Enter your username"
                    required
                    ng-disabled="loading"
                />
            </div>

            <div class="form-group">
                <label for="password">🔑 Password</label>
                <input 
                    type="password" 
                    id="password" 
                    ng-model="credentials.password" 
                    placeholder="Enter your password"
                    required
                    ng-disabled="loading"
                />
            </div>

            <div class="form-group">
                <button 
                    type="submit" 
                    class="login-button"
                    ng-disabled="loading || !credentials.username || !credentials.password"
                >
                    <span ng-if="!loading">✨ Sign In</span>
                    <span ng-if="loading">⏳ Signing in...</span>
                </button>
            </div>
        </form>

        <!-- Test Credentials Help -->
        <div class="help-text">
            <p><strong>📝 Test Credentials:</strong></p>
            <p>Username: <code>BAU</code></p>
            <p>Password: <code>3MvN=1T:</code></p>
        </div>
    </div>
</div>
